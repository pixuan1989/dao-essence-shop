<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your BaZi Chart Analysis — Four Pillars, Five Elements & Life Path</title>
    <meta name="description" content="Your personalized BaZi chart reading with Four Pillars breakdown, Five Elements analysis, Ten Gods interpretation, and Major Life Cycles — all decoded from your birth data.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.min.css">
    <script src="/js/i18n-switcher.js" defer></script>
    <style>
        /* ============================
           DESIGN TOKENS
           ============================ */
        :root {
            --bg:           #fff;
            --card:         #F8F7F5;
            --card-hover:   #F2F1ED;
            --sunken:       #FFFFFF;
            --line:         #E5E4DF;
            --line-light:   #EFEEEA;
            --ink:          #1C1C1A;
            --ink-2:        #50504A;
            --ink-3:        #8C8C85;
            --accent:       #8B7355;
            --accent-soft:  #D4C4A8;
            --accent-bg:    #F5F0E8;
            --good:         #2D7D46;
            --good-bg:      #EFF8F2;
            --good-line:    #C2DFCA;
            --bad:          #C25B56;
            --bad-bg:       #FDF5F5;
            --bad-line:     #F0C8C6;
            --wx-metal:     #9E8E6E;
            --wx-water:     #5B8299;
            --wx-wood:      #5E825E;
            --wx-fire:      #B8665E;
            --wx-earth:     #9E8B5E;
            --serif:        'Cormorant Garamond', 'SimSun', serif;
            --sans:         'Inter', -apple-system, sans-serif;
            --radius:       6px;
            --radius-sm:    4px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        /* ============================
           NAV — matches main site
           ============================ */
        /* Override main site styles that would conflict with bazi page */
        body { background-color: var(--bg, #fff) !important; }
        body::before { display: none !important; }

        .header {
            position: sticky !important; top: 0; z-index: 10000;
            padding: 0.8rem 0 !important;
            background: rgba(245,240,230,0.95) !important;
            backdrop-filter: blur(10px) !important;
            box-shadow: 0 1px 8px rgba(26,22,18,0.06) !important;
            border-bottom: 1px solid #E5E4DF;
        }
        .header .logo-cn { color: var(--text-primary) !important; }
        .header .logo-en { color: var(--text-secondary) !important; }
        .header .logo-icon { border-color: var(--accent-color) !important; color: var(--accent-color) !important; }
        .header .nav-link { color: var(--text-primary) !important; }
        .header .nav-link::after { background: var(--accent-color) !important; }
        .header .nav-dropdown { display: none !important; }
        .header .nav-dropdown-menu { display: none !important; }

        .bazi-nav-save {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 16px; border: 1px solid var(--accent-color); border-radius: 3px;
            background: transparent; color: var(--text-primary); font-size: 0.875rem;
            cursor: pointer; font-family: var(--font-body); font-weight: 500;
            transition: all 200ms ease; position: relative;
        }
        .bazi-nav-save:hover { background: var(--accent-color); color: #fff; }
        .bazi-nav-save svg { width: 15px; height: 15px; }

        @media (max-width: 600px) {
            .header { padding: 0.6rem 0 !important; }
        }

        /* ============================
           LOADING / ERROR
           ============================ */
        .bazi-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 1rem; }
        .bazi-loading-spinner { width: 28px; height: 28px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bazi-loading p { color: var(--ink-3); font-size: 0.85rem; }
        .bazi-error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 0.6rem; text-align: center; padding: 2rem; }
        .bazi-error-page p { color: var(--bad); }
        .bazi-error-page a { display: inline-block; margin-top: 0.6rem; padding: 0.5rem 1.2rem; background: var(--accent); color: #fff; border-radius: var(--radius-sm); text-decoration: none; font-size: 0.85rem; }

        /* ============================
           PAGE — Two-column layout
           ============================ */
        .bazi-page { max-width: 1140px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; display: grid; grid-template-columns: 1fr 300px; gap: 2.5rem; align-items: start; }
        .bazi-main { min-width: 0; }
        .bazi-sidebar { position: sticky; top: 56px; max-height: calc(100vh - 72px); overflow-y: auto; }

        /* Sidebar recommended articles */
        .sidebar-title {
            font-family: var(--serif); font-size: 1rem; color: var(--ink);
            letter-spacing: 0.04em; margin-bottom: 0.8rem;
            padding-bottom: 0.35rem; border-bottom: 1px solid var(--line);
        }
        .sidebar-card {
            display: block; text-decoration: none; padding: 0.85rem 0;
            border-bottom: 1px solid var(--line-light); transition: all 0.15s;
        }
        .sidebar-card:last-child { border-bottom: none; }
        .sidebar-card:hover { padding-left: 0.4rem; }
        .sidebar-card-cat {
            display: inline-block; font-size: 0.72rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.1em;
            background: var(--accent-bg); padding: 0.12rem 0.45rem; border-radius: 3px;
            margin-bottom: 0.35rem;
        }
        .sidebar-card h3 {
            font-family: var(--serif); font-size: 0.92rem; color: var(--ink);
            line-height: 1.45; margin-bottom: 0.25rem; letter-spacing: 0.02em;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .sidebar-card:hover h3 { color: var(--accent); }
        .sidebar-card-meta { font-size: 0.78rem; color: var(--ink-3); }
        .sidebar-cta a:hover { text-decoration: underline; }

        /* ============================
           RESULT HEADER
           ============================ */
        .result-header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--line); }
        .header-tags { display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap; margin-bottom: 0.6rem; }
        .tag { font-size: 0.88rem; color: var(--ink-2); padding: 0.15rem 0.6rem; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm); }
        .tag-dm strong { font-weight: 600; }
        .eight-char { font-family: var(--serif), 'SimSun', serif; font-size: clamp(1.2rem, 4vw, 1.8rem); color: var(--ink); letter-spacing: 0.15em; }

        /* ============================
           INFO CARD (Day Master Profile)
           ============================ */
        .info-card {
            background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
            padding: 0.8rem 1rem; margin-bottom: 1.2rem;
        }
        .info-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .info-item { display: flex; flex-direction: column; gap: 0.1rem; }
        .info-label { font-size: 0.82rem; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
        .info-value { font-size: 0.92rem; color: var(--ink); line-height: 1.6; }
        .info-value strong { color: var(--accent); }

        /* ============================
           SECTION
           ============================ */
        .bazi-main .section { margin-bottom: 1.5rem; padding: 0; }
        .section-title {
            font-family: var(--serif); font-size: 1rem; color: var(--ink);
            letter-spacing: 0.03em; margin-bottom: 0.6rem;
            padding-bottom: 0.35rem; border-bottom: 1px solid var(--line);
        }
        .section-desc { font-size: 0.88rem; color: var(--ink-3); margin-bottom: 0.5rem; text-align: center; }

        /* ============================
           MAIN GRID (Pillars + Elements)
           ============================ */
        .main-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 1.2rem; margin-bottom: 1.5rem; }

        /* ============================
           FOUR PILLARS
           ============================ */
        .pillars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .pillar {
            text-align: center; background: var(--card); border: 1px solid var(--line);
            border-radius: var(--radius); padding: 0.5rem 0.3rem;
        }
        .pillar-label { font-size: 0.72rem; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
        .pillar-stem { padding-bottom: 0.3rem; margin-bottom: 0.2rem; border-bottom: 1px solid var(--line-light); }
        .pillar-branch { padding-top: 0.15rem; }
        .pillar-char { display: block; font-family: var(--serif), 'SimSun', serif; font-size: 1.3rem; line-height: 1.2; color: var(--ink); }
        .pillar-wx { display: block; font-size: 0.72rem; letter-spacing: 0.04em; }
        .pillar-tg {
            display: inline-block; font-size: 0.72rem; color: var(--accent);
            background: var(--accent-bg); border-radius: 3px; padding: 0.02rem 0.35rem; margin-top: 0.12rem;
        }
        /* Tooltip on any element with data-tip: hover/tap to show */
        [data-tip] { position: relative; cursor: help; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--ink); color: #fff; font-size: 0.6rem; font-weight: 400; line-height: 1.5;
            padding: 0.4rem 0.55rem; border-radius: 5px; width: max-content; max-width: 220px;
            white-space: normal; text-align: left;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 100;
        }
        [data-tip]:hover::after,
        [data-tip].tg-active::after { opacity: 1; pointer-events: auto; }
        /* Dayun & liunian card tooltip: show below */
        .dayun-card[data-tip]::after,
        .ly-card[data-tip]::after { bottom: auto; top: calc(100% + 8px); }
        .pillar-tg-self { color: var(--ink-3); background: var(--line-light); }
        .pillar-hidden { margin-top: 0.25rem; padding-top: 0.25rem; border-top: 1px solid var(--line-light); display: flex; flex-direction: column; gap: 0.08rem; }
        .pillar-cg { font-size: 0.78rem; color: var(--ink-2); }
        .pillar-cg.cg-main { font-weight: 600; }

        /* ============================
           FIVE ELEMENTS
           ============================ */
        .wx-bars { display: flex; flex-direction: column; gap: 0.4rem; }
        .wx-row { display: grid; grid-template-columns: 50px 1fr 18px; align-items: center; gap: 0.4rem; }
        .wx-label { font-size: 0.88rem; font-weight: 500; }
        .wx-bar-track { height: 10px; background: var(--line-light); border-radius: 5px; overflow: hidden; }
        .wx-bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s ease-out; min-width: 4px; }
        .wx-count { font-size: 0.88rem; color: var(--ink-3); text-align: right; }

        .wx-summary { margin-top: 0.6rem; }
        .wx-summary-item { font-size: 0.88rem; color: var(--ink-2); line-height: 1.6; margin-bottom: 0.3rem; }
        .wx-summary-label { font-weight: 600; color: var(--ink); margin-right: 0.3rem; }
        .wx-summary-item em { font-style: normal; color: var(--ink-3); }

        /* ============================
           DAYUN CARDS
           ============================ */
        #section-dayun .section-title { margin-bottom: 0.8rem; }
        .current-hint {
            text-align: center; font-size: 0.92rem; color: var(--good);
            margin-bottom: 0.6rem; padding: 0.3rem 0.8rem;
            background: var(--good-bg); border: 1px solid var(--good-line); border-radius: var(--radius-sm);
        }
        .current-hint strong { color: var(--ink); }
        .dayun-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 0.4rem;
        }
        .dayun-card {
            text-align: center; padding: 0.5rem 0.3rem; background: var(--card);
            border: 1px solid var(--line); border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.15s; position: relative;
        }
        .dayun-card:hover { border-color: var(--accent-soft); background: var(--card-hover); }
        .dayun-card.active { border-color: var(--accent); background: var(--accent-bg); }
        .dayun-card.dayun-current { border-color: var(--good-line); background: var(--good-bg); }
        .dayun-card.dayun-current.active { border-color: var(--accent); background: var(--accent-bg); }
        .dayun-ganzhi { font-family: var(--serif), 'SimSun', serif; font-size: 0.95rem; color: var(--ink); letter-spacing: 0.04em; }
        .dayun-tg { font-size: 0.72rem; color: var(--accent); margin-top: 0.05rem; }
        .dayun-age { font-size: 0.82rem; color: var(--ink-2); margin-top: 0.1rem; }
        .dayun-years { font-size: 0.76rem; color: var(--ink-3); }
        .nzsc-dot { font-size: 0.76rem; margin-top: 0.15rem; }
        .nzsc-dot.auspicious { color: var(--good); }
        .nzsc-dot.neutral { color: var(--accent); }
        .nzsc-dot.inauspicious { color: var(--bad); }

        /* ============================
           DETAIL PANELS
           ============================ */
        .detail-panel {
            display: none; margin-top: 0.8rem; padding: 0.8rem;
            background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
            animation: fadeIn 0.15s ease-out;
        }
        .detail-panel.show { display: block; }
        .detail-panel-sm { padding: 0.6rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .detail-panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--line); }
        .detail-panel-head h3 { font-family: var(--serif); font-size: 0.95rem; color: var(--ink); }
        .detail-panel-head h4 { font-family: var(--serif); font-size: 0.88rem; color: var(--ink); }
        .btn-close {
            background: none; border: 1px solid var(--line); color: var(--ink-3);
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-close-sm { width: 20px; height: 20px; font-size: 0.75rem; }
        .btn-close:hover { border-color: var(--accent); color: var(--accent); }

        /* Detail Grid (2 cols for Ten God cards) */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

        .detail-card {
            background: var(--sunken); border: 1px solid var(--line-light);
            border-radius: var(--radius-sm); padding: 0.5rem 0.6rem;
        }
        .detail-card-header { font-size: 0.9rem; color: var(--ink-2); margin-bottom: 0.4rem; line-height: 1.5; }
        .detail-card-header strong { color: var(--ink); }
        .detail-card-body { font-size: 0.92rem; color: var(--ink-2); line-height: 1.65; }
        .detail-row { margin-bottom: 0.2rem; }
        .detail-key { color: var(--ink-3); font-size: 0.82rem; font-weight: 500; }
        .ai-loading { color: var(--ink-3); text-align: center; padding: 1rem 0; }
        .ai-loading::before { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: ai-spin 0.6s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
        @keyframes ai-spin { to { transform: rotate(360deg); } }
        .ai-verdict { font-size: 1rem; }

        /* NZSC badge */
        .nzsc-badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px;
            font-size: 0.88rem; font-weight: 500;
        }
        .nzsc-badge.auspicious { background: var(--good-bg); color: var(--good); border: 1px solid var(--good-line); }
        .nzsc-badge.neutral { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-soft); }
        .nzsc-badge.inauspicious { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad-line); }

        /* Cang Gan list */
        .canggan-list { display: flex; flex-direction: column; gap: 0.3rem; }
        .canggan-entry {
            display: grid; grid-template-columns: auto auto 1fr; gap: 0.4rem;
            align-items: baseline; font-size: 0.88rem;
        }
        .canggan-stem { font-weight: 600; font-size: 0.92rem; font-family: var(--serif), 'SimSun', serif; }
        .canggan-tg { color: var(--accent); font-size: 0.82rem; }
        .cg-primary-tag { font-size: 0.72rem; color: var(--ink-3); background: var(--line-light); padding: 0 0.25rem; border-radius: 2px; }
        .canggan-desc { color: var(--ink-3); font-size: 0.82rem; }

        /* ============================
           LIU NIAN
           ============================ */
        .liunian-title { font-size: 0.92rem; color: var(--ink-2); margin: 0.6rem 0 0.3rem; font-weight: 500; }
        .liunian-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 0.25rem; }
        .ly-card {
            text-align: center; padding: 0.25rem 0.15rem; background: var(--sunken);
            border: 1px solid var(--line-light); border-radius: 3px;
            cursor: pointer; transition: all 0.15s; position: relative; font-size: 0.72rem;
        }
        .ly-card:hover { border-color: var(--accent-soft); }
        .ly-card.ly-active { border-color: var(--accent); background: var(--accent-bg); }
        .ly-card.ly-current { border-color: var(--good-line); background: var(--good-bg); }
        .ly-card.ly-current.ly-active { border-color: var(--good); }
        .ly-ganzhi { font-family: var(--serif), 'SimSun', serif; color: var(--ink); font-size: 0.88rem; }
        .ly-tg { font-size: 0.68rem; color: var(--accent); margin-top: 0.02rem; }
        .ly-year { color: var(--ink-3); font-size: 0.72rem; margin-top: 0.02rem; }

        /* ============================
           BADGES
           ============================ */
        .badge-current {
            position: absolute; top: -1px; right: -1px;
            background: var(--good); color: #fff;
            font-size: 0.5rem; padding: 0 0.25rem; border-radius: 0 4px 0 3px;
            font-family: var(--sans); letter-spacing: 0.05em; font-weight: 600;
        }
        .badge-now {
            position: absolute; top: -1px; right: -1px;
            background: var(--good); color: #fff;
            font-size: 0.34rem; padding: 0 0.2rem; border-radius: 0 3px 0 3px;
            font-family: var(--sans); letter-spacing: 0.04em; font-weight: 600;
        }

        /* ============================
           CTA — Premium Conversion Box
           ============================ */
        .cta-box {
            margin-top: 2.5rem; padding: 0; border-radius: var(--radius);
            background: linear-gradient(135deg, #1C1A17 0%, #2A2520 40%, #1C1A17 100%);
            position: relative; overflow: hidden; text-align: center;
        }
        .cta-box::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.15) 0%, transparent 60%);
            pointer-events: none;
        }
        .cta-box-inner { position: relative; z-index: 1; padding: 2rem 1.5rem 1.8rem; }
        .cta-badge {
            display: inline-block; padding: 0.2rem 0.8rem; margin-bottom: 0.8rem;
            background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 20px; font-size: 0.7rem; font-weight: 600;
            color: #D4AF37; letter-spacing: 0.06em; text-transform: uppercase;
        }
        .cta-title {
            font-family: var(--serif); font-size: 1.5rem; color: #F5F0E8;
            margin-bottom: 0.4rem; line-height: 1.3;
        }
        .cta-subtitle {
            font-size: 0.85rem; color: rgba(245,240,232,0.65); line-height: 1.5;
            margin-bottom: 1.2rem; max-width: 420px; margin-left: auto; margin-right: auto;
        }
        .cta-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 1rem;
            margin-bottom: 1.4rem; font-size: 0.78rem; color: rgba(245,240,232,0.7);
        }
        .cta-list span { position: relative; padding-left: 1.1rem; }
        .cta-list span::before {
            content: '✦'; position: absolute; left: 0; color: #D4AF37; font-size: 0.65rem;
        }
        .cta-btn {
            display: inline-block; padding: 0.75rem 2.4rem;
            background: linear-gradient(135deg, #D4AF37, #C49B2F); color: #1C1A17;
            font-weight: 700; font-size: 0.95rem; border-radius: 4px;
            text-decoration: none; transition: all 0.2s; letter-spacing: 0.02em;
            box-shadow: 0 4px 16px rgba(212,175,55,0.3);
        }
        .cta-btn:hover {
            background: linear-gradient(135deg, #E0BD4A, #D4AF37);
            box-shadow: 0 6px 24px rgba(212,175,55,0.45);
            transform: translateY(-1px);
        }
        .cta-trust {
            margin-top: 1rem; display: flex; justify-content: center; gap: 1.2rem;
            font-size: 0.68rem; color: rgba(245,240,232,0.4);
        }
        .cta-trust span { display: flex; align-items: center; gap: 0.3rem; }
        .cta-trust .trust-dot {
            width: 4px; height: 4px; border-radius: 50%; background: rgba(212,175,55,0.5);
        }
        @media (max-width: 640px) {
            .cta-box-inner { padding: 1.5rem 1.2rem 1.4rem; }
            .cta-title { font-size: 1.2rem; }
            .cta-list { grid-template-columns: 1fr 1fr; }
        }

        /* ============================
           FOOTER
           ============================ */
        .bazi-footer { text-align: center; padding: 1rem; border-top: 1px solid var(--line); }
        .bazi-footer a { color: var(--accent); text-decoration: none; font-size: 0.78rem; }

        /* ============================
           RESPONSIVE
           ============================ */
        @media (max-width: 820px) {
            .bazi-page { grid-template-columns: 1fr; }
            .bazi-sidebar { position: static; max-height: none; }
        }
        @media (max-width: 640px) {
