<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaZi Reading | DAO Essence</title>
    <meta name="description" content="Your personalized BaZi chart analysis - Five Elements, Life Cycles, and destiny insights.">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-dark: #0A0A0A;
            --bg-primary: #0F0E0D;
            --bg-secondary: #1A1612;
            --bg-card: rgba(245, 240, 230, 0.03);
            --accent-color: #D4AF37;
            --accent-dim: rgba(212, 175, 55, 0.15);
            --text-primary: #F5F0E6;
            --text-secondary: rgba(245, 240, 230, 0.7);
            --text-muted: rgba(245, 240, 230, 0.45);
            --water-dark: #0C1520;
            --font-display: 'Cormorant Garamond', 'SimSun', serif;
            --font-body: 'Inter', sans-serif;
            --font-english: 'Inter', sans-serif;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* === LOADING === */
        .bazi-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1.5rem;
        }
        .bazi-loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--accent-dim);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bazi-loading p { color: var(--text-secondary); font-size: 0.95rem; letter-spacing: 0.06em; }

        /* === ERROR === */
        .bazi-error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1rem;
            text-align: center;
            padding: 2rem;
        }
        .bazi-error-page p { color: #C25B56; font-size: 1rem; }
        .bazi-error-page a {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.7rem 2rem;
            background: var(--accent-color);
            color: var(--bg-dark);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .bazi-error-page a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,0.35); }

        /* === NAV === */
        .bazi-nav {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.08);
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .bazi-nav-brand {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--accent-color);
            text-decoration: none;
            letter-spacing: 0.08em;
        }
        .bazi-nav-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }
        .bazi-nav-actions a:hover { color: var(--accent-color); }

        /* === MAIN CONTENT === */
        .bazi-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
        }

        /* === RESULT HEADER === */
        .bazi-result-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(212,175,55,0.12);
        }
        .bazi-result-basic {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .bazi-result-basic span {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }
        .bazi-result-daymaster {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            font-family: var(--font-display);
        }
        .bazi-result-eight {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--accent-color);
            letter-spacing: 0.25em;
            margin-top: 0.5rem;
        }

        /* === FOUR PILLARS === */
        .bazi-pillars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .bazi-pillar {
            text-align: center;
            background: var(--bg-card);
            border: 1px solid rgba(212,175,55,0.12);
            border-radius: 10px;
            padding: 1.2rem 0.5rem;
        }
        .bazi-pillar-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.6rem;
        }
        .bazi-pillar-gan, .bazi-pillar-zhi {
            padding: 0.5rem 0;
            border-bottom: 2px solid rgba(212,175,55,0.2);
        }
        .bazi-pillar-zhi { border-bottom: none; }
        .bazi-gan-char, .bazi-zhi-char {
            display: block;
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 1.8rem;
            color: #F5F0E6;
            line-height: 1.3;
        }
        .bazi-gan-wx, .bazi-zhi-wx {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            margin-top: 0.2rem;
        }
        .bazi-gan-tg {
            display: block;
            font-size: 0.65rem;
            color: var(--accent-color);
            background: rgba(212,175,55,0.08);
            border-radius: 10px;
            padding: 0.1rem 0.45rem;
            margin-top: 0.3rem;
            letter-spacing: 0.05em;
        }
        .bazi-gan-tg.dm-self {
            color: var(--text-primary);
            background: rgba(245,240,230,0.06);
        }
        .bazi-pillar-hidden {
            padding-top: 0.5rem;
            border-top: 1px dashed rgba(212,175,55,0.1);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .bazi-canggan {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
        .bazi-canggan.cg-primary {
            font-size: 0.85rem;
        }
        .bazi-canggan .cg-tg-label {
            font-size: 0.6rem;
            color: var(--accent-color);
            background: rgba(212,175,55,0.08);
            border-radius: 8px;
            padding: 0.05rem 0.4rem;
            font-family: var(--font-body);
            letter-spacing: 0;
        }

        /* === SECTION TITLES === */
        .bazi-section-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: #F5F0E6;
            letter-spacing: 0.08em;
            margin-bottom: 1.5rem;
            text-align: center;
            position: relative;
            padding-bottom: 0.8rem;
        }
        .bazi-section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: var(--accent-color);
            border-radius: 1px;
        }

        /* === FIVE ELEMENTS === */
        .bazi-wuxing-section { margin-bottom: 3rem; }
        .bazi-wuxing-bars {
            max-width: 520px;
            margin: 0 auto 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .bazi-wx-row {
            display: grid;
            grid-template-columns: 30px 34px 1fr 30px;
            align-items: center;
            gap: 0.6rem;
        }
        .bazi-wx-icon { font-size: 1rem; text-align: center; }
        .bazi-wx-name {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 0.9rem;
            text-align: center;
        }
        .bazi-wx-bar-bg {
            height: 16px;
            background: rgba(245,240,230,0.06);
            border-radius: 8px;
            overflow: hidden;
        }
        .bazi-wx-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s ease-out;
            min-width: 8px;
        }
        .bazi-wx-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
        .bazi-wx-note {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 1rem;
        }

        /* === FIVE ELEMENTS INTERPRETATION === */
        .bazi-wx-interpretation {
            max-width: 600px;
            margin: 1.5rem auto 0;
            padding: 1.5rem;
            background: rgba(212,175,55,0.04);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 12px;
        }
        .bazi-wx-interpretation h4 {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 0.8rem;
            letter-spacing: 0.06em;
        }
        .bazi-wx-interpretation p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* === DAY MASTER INTERPRETATION === */
        .bazi-dm-section { margin-bottom: 3rem; }
        .bazi-dm-interpretation {
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 12px;
        }
        .bazi-dm-interpretation h4 {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 0.6rem;
        }
        .bazi-dm-interpretation p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .bazi-dm-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .bazi-dm-trait {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 15px;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        /* === DA YUN (LIFE CYCLES) === */
        .bazi-dayun-section { margin-bottom: 3rem; }
        .bazi-qyy {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            letter-spacing: 0.04em;
        }
        .bazi-dayun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.7rem;
        }
        .bazi-dayun-item {
            text-align: center;
            padding: 1rem 0.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .bazi-dayun-item:hover {
            border-color: rgba(212,175,55,0.3);
            transform: translateY(-2px);
        }
        .bazi-dayun-item.active {
            border-color: var(--accent-color);
            background: rgba(212,175,55,0.06);
        }
        .bazi-dayun-ganzhi {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 1.2rem;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            margin-bottom: 0.15rem;
        }
        .bazi-dayun-tg {
            font-size: 0.6rem;
            color: var(--accent-color);
            background: rgba(212,175,55,0.1);
            border-radius: 8px;
            padding: 0.05rem 0.4rem;
            display: inline-block;
            margin-bottom: 0.2rem;
        }
        .bazi-dayun-age {
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }
        .bazi-dayun-years {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }
        .bazi-dayun-status {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            letter-spacing: 0.02em;
        }
        .bazi-dayun-status.auspicious { color: #6B8E6B; }
        .bazi-dayun-status.neutral { color: var(--accent-color); }
        .bazi-dayun-status.inauspicious { color: #C25B56; }

        /* === DAYUN DETAIL PANEL (expandable) === */
        .bazi-dayun-detail {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(212,175,55,0.12);
            border-radius: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        .bazi-dayun-detail.show { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bazi-dayun-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(212,175,55,0.08);
        }
        .bazi-dayun-detail-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--accent-color);
            letter-spacing: 0.06em;
        }
        .bazi-dayun-detail-close {
            background: none;
            border: 1px solid rgba(212,175,55,0.2);
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .bazi-dayun-detail-close:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .bazi-dayun-interpretation {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.2rem;
        }
        .bazi-dayun-interpretation strong {
            color: var(--text-primary);
        }

        /* === DAYUN DETAIL — TEN GODS SECTIONS === */
        .dy-life-stage {
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(245,240,230,0.02);
            border-radius: 8px;
            border-left: 3px solid var(--accent-color);
        }
        .dy-life-stage strong { color: var(--text-primary); }
        .dy-life-stage p { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.3rem; }
        .dy-auspicious { color: #6B8E6B !important; font-size: 0.85rem !important; }
        .dy-inauspicious { color: #C25B56 !important; font-size: 0.85rem !important; }

        .dy-tengod-section {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(212,175,55,0.04);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 10px;
        }
        .dy-tengod-label {
            font-size: 0.82rem;
            color: var(--accent-color);
            margin-bottom: 0.6rem;
            letter-spacing: 0.03em;
        }
        .dy-tengod-label strong { color: var(--text-primary); }
        .dy-tengod-section > p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 0.8rem;
        }
        .dy-tengod-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }
        .dy-tengod-item {
            padding: 0.6rem 0.8rem;
            background: rgba(245,240,230,0.02);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .dy-tengod-item strong { color: var(--accent-color); font-size: 0.75rem; display: block; margin-bottom: 0.2rem; }

        .dy-branch-section {
            margin: 1rem 0;
        }
        .dy-branch-section > strong {
            font-size: 0.82rem;
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.5rem;
        }
        .dy-canggan-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .dy-canggan-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            background: rgba(245,240,230,0.02);
            border-radius: 6px;
        }
        .dy-canggan-item .cg-stem {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 0.9rem;
            min-width: 40px;
        }
        .dy-canggan-item .cg-tg {
            color: var(--accent-color);
            font-size: 0.75rem;
        }

        .dy-summary {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(212,175,55,0.08);
        }
        .dy-summary p { font-size: 0.83rem; margin-bottom: 0.3rem; }
        .dy-fav { color: #6B8E6B !important; }
        .dy-fav strong { color: #6B8E6B !important; }
        .dy-unfav { color: #C25B56 !important; }
        .dy-unfav strong { color: #C25B56 !important; }

        /* === LIU NIAN (FLOW YEARS) TABLE === */
        .bazi-liunian-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            letter-spacing: 0.04em;
        }
        .bazi-liunian-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.4rem;
        }
        .bazi-liunian-item {
            text-align: center;
            padding: 0.4rem 0.2rem;
            background: rgba(245,240,230,0.02);
            border: 1px solid rgba(212,175,55,0.06);
            border-radius: 6px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .bazi-liunian-item:hover {
            border-color: rgba(212,175,55,0.25);
            transform: translateY(-1px);
        }
        .bazi-liunian-item.ly-active {
            border-color: var(--accent-color);
            background: rgba(212,175,55,0.06);
        }
        .bazi-liunian-item.current-year {
            border-color: rgba(107, 142, 107, 0.5);
            background: rgba(107, 142, 107, 0.08);
        }
        .bazi-liunian-item.current-year.ly-active {
            border-color: #6B8E6B;
            background: rgba(107, 142, 107, 0.12);
        }
        .ly-current-badge {
            position: absolute;
            top: -1px;
            right: -1px;
            background: #6B8E6B;
            color: #fff;
            font-size: 0.45rem;
            padding: 0 0.25rem;
            border-radius: 0 5px 0 4px;
            letter-spacing: 0.04em;
            font-family: var(--font-body);
        }
        .bazi-liunian-item .ly-year {
            color: var(--text-muted);
            font-size: 0.65rem;
        }
        .bazi-liunian-item .ly-ganzhi {
            font-family: var(--font-display), 'SimSun', serif;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
        .bazi-liunian-item .ly-tg {
            font-size: 0.55rem;
            color: var(--accent-color);
            background: rgba(212,175,55,0.1);
            border-radius: 6px;
            padding: 0.02rem 0.3rem;
            display: inline-block;
            margin-top: 0.1rem;
        }

        /* === CURRENT DAYUN HIGHLIGHT === */
        .bazi-dayun-item.current-dayun {
            border-color: rgba(107, 142, 107, 0.5);
            background: rgba(107, 142, 107, 0.06);
        }
        .bazi-dayun-item.current-dayun:hover {
            border-color: rgba(107, 142, 107, 0.7);
        }
        .bazi-dayun-item.current-dayun.active {
            border-color: var(--accent-color);
            background: rgba(212,175,55,0.06);
        }
        .bazi-dayun-current-badge {
            position: absolute;
            top: -1px;
            right: -1px;
            background: #6B8E6B;
            color: #fff;
            font-size: 0.45rem;
            padding: 0 0.35rem;
            border-radius: 0 9px 0 6px;
            letter-spacing: 0.04em;
            font-family: var(--font-body);
        }
        .bazi-dayun-item {
            position: relative;
        }
        .bazi-current-dayun-hint {
            text-align: center;
            color: #6B8E6B;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            letter-spacing: 0.04em;
        }
        .bazi-current-dayun-hint strong {
            color: var(--text-primary);
        }

        /* === LIU NIAN DETAIL PANEL === */
        .bazi-liunian-detail {
            display: none;
            margin-top: 1rem;
            padding: 1.2rem;
            background: rgba(245,240,230,0.02);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 10px;
            animation: fadeIn 0.3s ease-out;
        }
        .bazi-liunian-detail.show { display: block; }
        .bazi-liunian-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.6rem;
