<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaZi Reading | DAO Essence</title>
    <meta name="description" content="Your personalized BaZi chart analysis - Five Elements, Life Cycles, and destiny insights.">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* === RESET & BASE === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-page: #FFFFFF;
            --bg-card: #F8F8F8;
            --bg-hover: #F0F0F0;
            --border-color: #E5E5E5;
            --border-light: #F0F0F0;
            --text-primary: #1A1A1A;
            --text-secondary: #555555;
            --text-muted: #999999;
            --accent-color: #8B7355;
            --accent-bg: #F5F0E8;
            --accent-border: #D4C4A8;
            --green: #2D7D46;
            --green-bg: #EEFBF2;
            --green-border: #B8E6C8;
            --red: #C25B56;
            --red-bg: #FFF5F5;
            --red-border: #F0C8C6;
            --font-display: 'Cormorant Garamond', 'SimSun', serif;
            --font-body: 'Inter', sans-serif;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* === LOADING === */
        .bazi-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            gap: 1rem;
        }
        .bazi-loading-spinner {
            width: 36px; height: 36px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bazi-loading p { color: var(--text-muted); font-size: 0.9rem; }

        /* === ERROR === */
        .bazi-error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            gap: 0.8rem;
            text-align: center;
            padding: 2rem;
        }
        .bazi-error-page p { color: var(--red); font-size: 0.95rem; }
        .bazi-error-page a {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.6rem 1.5rem;
            background: var(--accent-color);
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* === NAV === */
        .bazi-nav {
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .bazi-nav-brand {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--accent-color);
            text-decoration: none;
            letter-spacing: 0.06em;
        }
        .bazi-nav-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .bazi-nav-actions a:hover { color: var(--accent-color); }

        /* === MAIN CONTENT === */
        .bazi-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        /* === RESULT HEADER === */
        .bazi-result-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .bazi-result-basic {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 0.8rem;
        }
        .bazi-result-basic span {
            font-size: 0.82rem;
            color: var(--text-secondary);
            padding: 0.2rem 0.7rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        .bazi-result-daymaster {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-family: var(--font-display);
        }
        .bazi-result-eight {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: var(--text-primary);
            letter-spacing: 0.2em;
        }

        /* === FOUR PILLARS === */
        .bazi-pillars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
            margin-bottom: 2rem;
        }
        .bazi-pillar {
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.8rem 0.4rem;
        }
        .bazi-pillar-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
        }
        .bazi-pillar-gan, .bazi-pillar-zhi {
            padding: 0.3rem 0;
        }
        .bazi-gan-char, .bazi-zhi-char {
            display: block;
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 1.5rem;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .bazi-gan-wx, .bazi-zhi-wx {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            margin-top: 0.1rem;
        }
        .bazi-gan-tg {
            display: block;
            font-size: 0.6rem;
            color: var(--accent-color);
            background: var(--accent-bg);
            border-radius: 4px;
            padding: 0.05rem 0.4rem;
            margin-top: 0.2rem;
            letter-spacing: 0.03em;
        }
        .bazi-gan-tg.dm-self {
            color: var(--text-primary);
            background: var(--bg-card);
        }
        .bazi-pillar-hidden {
            padding-top: 0.4rem;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .bazi-canggan {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 0.75rem;
        }
        .bazi-canggan.cg-primary { font-size: 0.8rem; }
        .bazi-canggan .cg-tg-label {
            font-size: 0.55rem;
            color: var(--accent-color);
            background: var(--accent-bg);
            border-radius: 3px;
            padding: 0.02rem 0.3rem;
            font-family: var(--font-body);
        }

        /* === SECTION TITLES === */
        .bazi-section-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            margin-bottom: 1rem;
            text-align: center;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        /* === MAIN TWO-COLUMN ROW === */
        .bazi-main-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .bazi-main-col .bazi-section-title { margin-bottom: 0.8rem; }
        @media (max-width: 700px) {
            .bazi-main-row { grid-template-columns: 1fr; }
        }

        /* === FIVE ELEMENTS === */
        .bazi-wuxing-bars {
            max-width: 480px;
            margin: 0 auto 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .bazi-wx-row {
            display: grid;
            grid-template-columns: 50px 1fr 24px;
            align-items: center;
            gap: 0.5rem;
        }
        .bazi-wx-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .bazi-wx-bar-bg {
            height: 12px;
            background: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }
        .bazi-wx-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease-out;
            min-width: 6px;
        }
        .bazi-wx-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }
        .bazi-wx-note {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.6rem;
        }

        /* === FIVE ELEMENTS SUMMARY === */
        .bazi-wx-summary {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .bazi-wx-summary strong { color: var(--text-primary); }

        /* === DA YUN (LIFE CYCLES) === */
        .bazi-dayun-section { margin-bottom: 2rem; }
        .bazi-qyy {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.82rem;
            margin-bottom: 0.8rem;
        }
        .bazi-dayun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.5rem;
        }
        .bazi-dayun-item {
            text-align: center;
            padding: 0.7rem 0.4rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .bazi-dayun-item:hover {
            border-color: var(--accent-border);
            background: var(--bg-hover);
        }
        .bazi-dayun-item.active {
            border-color: var(--accent-color);
            background: var(--accent-bg);
        }
        .bazi-dayun-ganzhi {
            font-family: var(--font-display), 'SimSun', serif;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: 0.08em;
            margin-bottom: 0.1rem;
        }
        .bazi-dayun-tg {
            font-size: 0.58rem;
            color: var(--accent-color);
            background: var(--accent-bg);
            border-radius: 3px;
            padding: 0.02rem 0.35rem;
            display: inline-block;
            margin-bottom: 0.15rem;
        }
        .bazi-dayun-age {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .bazi-dayun-years {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }
        .bazi-dayun-status {
            font-size: 0.65rem;
            margin-top: 0.3rem;
        }
        .bazi-dayun-status.auspicious { color: var(--green); }
        .bazi-dayun-status.neutral { color: var(--accent-color); }
        .bazi-dayun-status.inauspicious { color: var(--red); }

        /* === DAYUN DETAIL PANEL === */
        .bazi-dayun-detail {
            display: none;
            margin-top: 1rem;
            padding: 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            animation: fadeIn 0.2s ease-out;
        }
        .bazi-dayun-detail.show { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .bazi-dayun-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .bazi-dayun-detail-title {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--text-primary);
        }
        .bazi-dayun-detail-close {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bazi-dayun-detail-close:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .bazi-dayun-interpretation {
            font-size: 0.83rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 1rem;
        }
        .bazi-dayun-interpretation strong { color: var(--text-primary); }

        /* === DAYUN DETAIL DATA === */
        .dy-data-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .dy-data-col {
            padding: 0.5rem 0.7rem;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        .dy-data-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .dy-label { font-size: 0.72rem; color: var(--text-muted); }
        .dy-value { font-size: 0.82rem; color: var(--text-primary); font-weight: 500; }
        .dy-value.auspicious { color: var(--green); }
        .dy-value.inauspicious { color: var(--red); }
        .dy-value.neutral { color: var(--accent-color); }
        .dy-canggan-row {
            font-size: 0.78rem;
            color: var(--text-secondary);
            padding: 0.4rem 0.7rem;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            line-height: 1.6;
        }

        /* === LIU NIAN DETAIL DATA === */
        .ly-data-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }
        .ly-data-col {
            padding: 0.4rem 0.6rem;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        .ly-data-item {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .ly-label { font-size: 0.7rem; color: var(--text-muted); }
        .ly-value { font-size: 0.8rem; color: var(--text-primary); font-weight: 500; }
        .ly-canggan-row {
            font-size: 0.76rem;
            color: var(--text-secondary);
            padding: 0.3rem 0.6rem;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            line-height: 1.6;
        }

        /* === LIU NIAN (FLOW YEARS) === */
        .bazi-liunian-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            margin-top: 0.8rem;
        }
        .bazi-liunian-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 0.3rem;
        }
        .bazi-liunian-item {
            text-align: center;
            padding: 0.3rem 0.15rem;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .bazi-liunian-item:hover { border-color: var(--accent-border); }
        .bazi-liunian-item.ly-active {
            border-color: var(--accent-color);
            background: var(--accent-bg);
        }
        .bazi-liunian-item.current-year {
            border-color: var(--green-border);
            background: var(--green-bg);
        }
        .bazi-liunian-item.current-year.ly-active {
            border-color: var(--green);
            background: var(--green-bg);
        }
        .ly-current-badge {
            position: absolute;
            top: -1px; right: -1px;
            background: var(--green);
            color: #fff;
            font-size: 0.4rem;
            padding: 0 0.2rem;
            border-radius: 0 4px 0 3px;
            font-family: var(--font-body);
        }
        .bazi-liunian-item .ly-year { color: var(--text-muted); font-size: 0.6rem; }
        .bazi-liunian-item .ly-ganzhi {
            font-family: var(--font-display), 'SimSun', serif;
            color: var(--text-primary);
            font-size: 0.75rem;
        }
        .bazi-liunian-item .ly-tg {
            font-size: 0.5rem;
            color: var(--accent-color);
            background: var(--accent-bg);
            border-radius: 3px;
            padding: 0.01rem 0.25rem;
            display: inline-block;
            margin-top: 0.05rem;
        }

        /* === CURRENT DAYUN HIGHLIGHT === */
        .bazi-dayun-item.current-dayun {
            border-color: var(--green-border);
            background: var(--green-bg);
        }
        .bazi-dayun-item.current-dayun:hover { border-color: var(--green); }
        .bazi-dayun-item.current-dayun.active {
            border-color: var(--accent-color);
            background: var(--accent-bg);
        }
        .bazi-dayun-current-badge {
            position: absolute;
            top: -1px; right: -1px;
            background: var(--green);
            color: #fff;
            font-size: 0.42rem;
            padding: 0 0.3rem;
            border-radius: 0 6px 0 5px;
            font-family: var(--font-body);
        }
        .bazi-current-dayun-hint {
            text-align: center;
            color: var(--green);
            font-size: 0.82rem;
            margin-bottom: 0.8rem;
        }
        .bazi-current-dayun-hint strong { color: var(--text-primary); }

        /* === LIU NIAN DETAIL PANEL === */
        .bazi-liunian-detail {
            display: none;
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            animation: fadeIn 0.2s ease-out;
        }
        .bazi-liunian-detail.show { display: block; }
        .bazi-liunian-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--border-light);
        }
        .bazi-liunian-detail-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .bazi-liunian-detail-close {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 22px; height: 22px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bazi-liunian-detail-close:hover { border-color: var(--accent-color); color: var(--accent-color); }

        /* === CTA SECTION === */
            margin-top: 2.5rem;
            padding: 1.8rem 1.5rem;
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            border-radius: 10px;
            text-align: center;
        }
        .bazi-cta-inner { max-width: 520px; margin: 0 auto; }
        .bazi-cta-title {
            font-size: 1.15rem;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-family: var(--font-display);
        }
        .bazi-cta-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .bazi-cta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .bazi-cta-item {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.4;
            padding: 0.2rem 0;
        }
        .bazi-cta-btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            background: var(--accent-color);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .bazi-cta-btn:hover { background: #7A6348; }
        .bazi-cta-note {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.8rem;
        }

        /* === FOOTER === */
        .bazi-footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        .bazi-footer a { color: var(--accent-color); text-decoration: none; font-size: 0.82rem; }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .bazi-page { padding: 1.5rem 1rem 2rem; }
            .bazi-pillars-grid { grid-template-columns: repeat(2, 1fr); }
            .bazi-dayun-grid { grid-template-columns: repeat(4, 1fr); }
            .bazi-liunian-grid { grid-template-columns: repeat(5, 1fr); }
            .bazi-cta-grid { grid-template-columns: 1fr; }
            .dy-data-row, .ly-data-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav class="bazi-nav">
        <a href="/" class="bazi-nav-brand">DAO ESSENCE</a>
        <div class="bazi-nav-actions">
            <a href="/#free-bazi">New Reading</a>
        </div>
    </nav>

    <!-- LOADING STATE -->
    <div id="bazi-loading" class="bazi-loading">
        <div class="bazi-loading-spinner"></div>
        <p>Calculating your BaZi chart...</p>
    </div>

    <!-- ERROR STATE -->
    <div id="bazi-error" class="bazi-error-page" style="display:none;"></div>

    <!-- RESULT CONTAINER -->
    <div id="bazi-result" class="bazi-page" style="display:none;"></div>

    <!-- SCRIPTS -->
    <script src="paipan.min.js"></script>
    <script src="bazi-result.js"></script>
</body>
</html>
