<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - DAO Essence</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .header { background: rgba(245,240,230,0.97) !important; backdrop-filter: blur(10px) !important; box-shadow: var(--shadow-md) !important; }
        .header .nav-link, .header .logo-cn { color: var(--text-primary) !important; }
        .header .logo-en { color: var(--text-light) !important; }
        .header .logo-icon { border-color: var(--accent-color) !important; color: var(--accent-color) !important; }
        .header .mobile-menu-btn span { background: var(--text-primary) !important; }

        .confirm-page {
            padding-top: 80px;
            min-height: 100vh;
            background: var(--bg-secondary);
        }

        .confirm-hero {
            background: linear-gradient(135deg, var(--wood-dark, #1a3a2a) 0%, var(--water-dark) 100%);
            padding: 60px 20px;
            text-align: center;
        }
        .confirm-icon {
            width: 80px; height: 80px;
            background: rgba(212,175,55,0.15);
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .confirm-hero h1 {
            font-family: var(--font-display);
            color: var(--bg-primary);
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }
        .confirm-hero p { color: rgba(245,240,230,0.8); font-size: var(--text-base); }
        .order-id-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 20px;
            background: rgba(212,175,55,0.15);
            border: 1px solid var(--accent-color);
            border-radius: 30px;
            color: var(--accent-color);
            font-family: monospace;
            font-size: var(--text-sm);
            letter-spacing: 0.1em;
        }

        .confirm-layout {
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .confirm-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(212,175,55,0.15);
        }
        .confirm-card h3 {
            font-family: var(--font-display);
            color: var(--accent-color);
            font-size: var(--text-xl);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            display: flex; align-items: center; gap: 10px;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 28px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 9px; top: 6px; bottom: 6px;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-color), rgba(212,175,55,0.1));
        }
        .timeline-item {
            position: relative;
            margin-bottom: 22px;
            padding-left: 18px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -28px; top: 5px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--bg-primary);
            border: 2px solid var(--accent-color);
        }
        .timeline-item.active::before { background: var(--accent-color); }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-status {
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--text-base);
        }
        .timeline-item.active .timeline-status { color: var(--accent-color); }
        .timeline-desc { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 3px; }
        .timeline-time { font-size: var(--text-xs); color: var(--text-light); margin-top: 2px; font-style: italic; }

        /* Order items */
        .order-item {
            display: flex; gap: 14px; align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212,175,55,0.08);
        }
        .order-item:last-child { border-bottom: none; }
        .order-item-img {
            width: 65px; height: 65px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-accent);
            flex-shrink: 0;
        }
        .order-item-name { font-weight: 500; color: var(--text-primary); font-size: var(--text-sm); }
        .order-item-qty { font-size: var(--text-xs); color: var(--text-light); margin-top: 4px; }
        .order-item-price {
            margin-left: auto;
            font-weight: 700;
            color: var(--fire-primary);
            font-size: var(--text-base);
            white-space: nowrap;
        }

        /* Summary lines */
        .summary-row {
            display: flex; justify-content: space-between;
            padding: 8px 0;
            font-size: var(--text-sm);
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(212,175,55,0.07);
        }
        .summary-row.total {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
            padding-top: 14px;
            border-top: 2px solid rgba(212,175,55,0.25);
            border-bottom: none;
        }
        .summary-row.total span:last-child { color: var(--fire-primary); }

        /* Address & shipping grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media(max-width:600px) { .info-grid { grid-template-columns: 1fr; } }
        .info-block h4 {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        .info-block p {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .info-block strong { color: var(--text-primary); }

        /* Action buttons */
        .action-btns {
            display: flex; gap: 12px; flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn-primary-solid {
            flex: 1; min-width: 140px;
            padding: 14px;
            background: var(--gradient-gold);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--bg-dark);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            font-family: var(--font-display);
            font-size: var(--text-sm);
        }
        .btn-primary-solid:hover { filter: brightness(1.08); transform: translateY(-2px); }
        .btn-outline-gold {
            flex: 1; min-width: 140px;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--accent-color);
            border-radius: var(--radius-sm);
            color: var(--accent-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            font-size: var(--text-sm);
        }
        .btn-outline-gold:hover { background: var(--accent-color); color: var(--bg-dark); }

        /* What's next */
        .next-steps {
            display: grid; grid-template-columns: repeat(3,1fr); gap: 16px;
            margin-top: 4px;
        }
        @media(max-width:600px) { .next-steps { grid-template-columns: 1fr; } }
        .next-step {
            text-align: center;
            padding: 20px 14px;
            background: var(--bg-accent);
            border-radius: var(--radius-md);
            border: 1px solid rgba(212,175,55,0.1);
        }
        .next-step-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .next-step h4 { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .next-step p { font-size: var(--text-xs); color: var(--text-secondary); line-height: 1.6; }

        /* No order state */
        .no-order {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
        }
        .no-order h2 { font-family: var(--font-display); color: var(--text-primary); margin-bottom: 12px; }
        .no-order p { color: var(--text-secondary); margin-bottom: 24px; }
    </style>
</head>
<body>
    <header class="header scrolled">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">
                    <div class="logo-icon"></div>
                    <div class="logo-text"><span class="logo-cn">DAO本质</span></div>
                </a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="shop.html" class="nav-link">Energy Shop</a></li>
                    <li><a href="about.html" class="nav-link">About Us</a></li>
                </ul>
                <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
            </nav>
        </div>
    </header>

    <div class="confirm-page">
        <div id="confirmContent"></div>
    </div>

    <script src="main.js"></script>
    <script>
        const order = JSON.parse(localStorage.getItem('daoLastOrder'));
        const USD_RATE = 7.2;

        function cnyToUsd(cny) { return (parseFloat(cny) / USD_RATE).toFixed(2); }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function getEstimatedDelivery(method) {
            const d = new Date();
            let days = method === 'dhl' ? 5 : method === 'express' ? 12 : 25;
            d.setDate(d.getDate() + days);
            return d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
        }

        function getShippingLabel(method) {
            const map = { standard: 'Standard International (15–25 days)', express: 'Express International (7–12 days)', dhl: 'DHL Express Priority (3–5 days)' };
            return map[method] || method;
        }

        const container = document.getElementById('confirmContent');

        if (!order) {
            container.innerHTML = `
                <div class="confirm-layout">
                    <div class="no-order">
                        <h2>No Recent Order Found</h2>
                        <p>It looks like you haven't placed an order recently, or your session has expired.</p>
                        <a href="shop.html" class="btn-primary-solid" style="display:inline-block;padding:14px 32px;">Browse Products</a>
                    </div>
                </div>`;
        } else {
            const estimatedDelivery = getEstimatedDelivery(order.shipping.method);
            const itemsHtml = order.items.map(item => {
                const priceUsd = cnyToUsd(item.price);
                const subUsd = (item.price * item.quantity / USD_RATE).toFixed(2);
                return `
                    <div class="order-item">
                        <img src="${item.image}" alt="${item.titleEn || ''}" class="order-item-img">
                        <div>
                            <div class="order-item-name">${item.titleEn || item.titleZh || 'Product'}</div>
                            <div class="order-item-qty">Qty: ${item.quantity} × $${priceUsd}</div>
                        </div>
                        <div class="order-item-price">$${subUsd}</div>
                    </div>`;
            }).join('');

            container.innerHTML = `
                <div class="confirm-hero">
                    <div class="confirm-icon">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <h1>Order Confirmed!</h1>
                    <p>Thank you, ${order.shipping.firstName}! Your order has been received and is being processed.</p>
                    <div class="order-id-badge">Order ID: ${order.id}</div>
                </div>

                <div class="confirm-layout">

                    <!-- What's Next -->
                    <div class="confirm-card">
                        <h3>
                            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l2.5 2.5"/></svg>
                            What Happens Next
                        </h3>
                        <div class="next-steps">
                            <div class="next-step">
                                <span class="next-step-icon">📧</span>
                                <h4>Confirmation Email</h4>
                                <p>A confirmation email will be sent to <strong>${order.shipping.email}</strong> within 15 minutes.</p>
                            </div>
                            <div class="next-step">
                                <span class="next-step-icon">🙏</span>
                                <h4>Consecration Ritual</h4>
                                <p>Our Taoist masters will perform the energy consecration ritual before your items are shipped.</p>
                            </div>
                            <div class="next-step">
                                <span class="next-step-icon">📦</span>
                                <h4>Shipment & Tracking</h4>
                                <p>You'll receive a tracking number once your order ships. Estimated delivery by <strong>${estimatedDelivery}</strong>.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Order Status Timeline -->
                    <div class="confirm-card">
                        <h3>
                            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h14v14H3z"/><path d="M7 7h6M7 10h6M7 13h3"/></svg>
                            Order Status
                        </h3>
                        <div class="timeline">
                            <div class="timeline-item active">
                                <div class="timeline-status">✓ Order Received</div>
                                <div class="timeline-desc">Your order has been confirmed and payment processed.</div>
                                <div class="timeline-time">${formatDate(order.date)}</div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-status">Consecration & Preparation</div>
                                <div class="timeline-desc">Items are being prepared and consecrated by our Taoist masters (1–3 days).</div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-status">Shipped</div>
                                <div class="timeline-desc">Your package is on its way. Tracking info will be emailed to you.</div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-status">Delivered</div>
                                <div class="timeline-desc">Estimated arrival: <strong>${estimatedDelivery}</strong></div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Details -->
                    <div class="confirm-card">
                        <h3>
                            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2H5a1 1 0 00-1 1v14a1 1 0 001 1h10a1 1 0 001-1V9M9 2l6 7M9 2v7h6"/></svg>
                            Order Details
                        </h3>
                        <div>${itemsHtml}</div>
                        <div style="margin-top: 16px;">
                            <div class="summary-row"><span>Subtotal</span><span>$${order.subtotal}</span></div>
                            <div class="summary-row"><span>Shipping (${getShippingLabel(order.shipping.method)})</span><span>$${order.shippingCost}</span></div>
                            ${parseFloat(order.discount) > 0 ? `<div class="summary-row"><span>Discount</span><span style="color:var(--wood-primary)">-$${order.discount}</span></div>` : ''}
                            <div class="summary-row total"><span>Total Paid</span><span>$${order.total} USD</span></div>
                        </div>
                    </div>

                    <!-- Shipping & Payment Info -->
                    <div class="confirm-card">
                        <h3>
                            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2C7.24 2 5 4.24 5 7c0 4.25 5 11 5 11s5-6.75 5-11c0-2.76-2.24-5-5-5z"/><circle cx="10" cy="7" r="2"/></svg>
                            Shipping & Payment
                        </h3>
                        <div class="info-grid">
                            <div class="info-block">
                                <h4>Shipping Address</h4>
                                <p>
                                    <strong>${order.shipping.firstName} ${order.shipping.lastName}</strong><br>
                                    ${order.shipping.address}<br>
                                    ${order.shipping.city}${order.shipping.state ? ', ' + order.shipping.state : ''} ${order.shipping.zip}<br>
                                    ${order.shipping.country}
                                </p>
                            </div>
                            <div class="info-block">
                                <h4>Payment Method</h4>
                                <p>
                                    ${order.payment === 'paypal' ? '🅿️ <strong>PayPal</strong>' : '💳 <strong>Credit Card</strong>'}<br>
                                    <span style="color:var(--wood-primary);">✓ Payment Confirmed</span><br><br>
                                    <strong>Shipping Method</strong><br>
                                    ${getShippingLabel(order.shipping.method)}
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="confirm-card">
                        <h3>
                            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L10 14.3l-4.8 2.6.9-5.4L2.2 7.7l5.4-.8L10 2z"/></svg>
                            Need Help?
                        </h3>
                        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:16px;">
                            For questions about your order, please contact us at <strong>support@daoessence.com</strong> or via WhatsApp. Reference your Order ID: <strong>${order.id}</strong>
                        </p>
                        <div class="action-btns">
                            <a href="shop.html" class="btn-primary-solid">Continue Shopping</a>
                            <a href="contact.html" class="btn-outline-gold">Contact Support</a>
                        </div>
                    </div>

                </div>`;
        }
    </script>
</body>
</html>
