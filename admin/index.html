<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>博客管理 — DAO Essence</title>
    <style>
        /* Full-screen CMS layout */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    </style>
    <!-- MUST be set BEFORE loading CMS script to prevent auto-loading config.yml -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <!-- DecapCMS loaded from CDN -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
    <!-- CMS config embedded directly — no external config.yml needed -->
    <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'pixuan1989/dao-essence-shop',
          branch: 'main',
          base_url: 'https://www.daoessentia.com'
        },
        media_folder: 'images/blog',
        public_folder: 'https://raw.githubusercontent.com/pixuan1989/dao-essence-shop/main/images/blog',
        locale: 'zh',

        collections: [

          // ── 博客文章（统一入口，所有文章都通过分类字段归类） ─────────────────
          {
            name: 'blog',
            label: '博客文章',
            folder: 'blog/posts',
            create: true,
            delete: true,
            slug: '{{slug}}',
            preview_path: 'blog/{{slug}}',
            summary: '{{title}} — {{date}}',
            format: 'frontmatter',
            editor: { preview: true },
            fields: [
              { label: '标题', name: 'title', widget: 'string', hint: '文章标题（建议60字以内，利于SEO）' },
              {
                label: '分类', name: 'category', widget: 'select', default: 'bazi-astrology',
                options: [
                  { label: 'BaZi Astrology', value: 'bazi-astrology' },
                  { label: 'Chinese Zodiac', value: 'zodiac-horoscope' },
                  { label: 'Feng Shui', value: 'feng-shui' },
                  { label: 'Daily Horoscope', value: 'daily-horoscope' },
                  { label: 'Lucky Tips', value: 'lucky-tips' }
                ]
              },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true, hint: '添加相关标签（按回车添加）', default: ['八字', '命理'] },
              { label: '描述', name: 'description', widget: 'text', hint: '文章摘要（150-160字，用于SEO）' },
              { label: '发布日期', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', default: '{{now}}' },
              { label: 'Author', name: 'author', widget: 'select', options: ['Xuanzhen', 'Dingwei'], default: 'Xuanzhen' },
              { label: '阅读时长（分钟）', name: 'readTime', widget: 'number', default: 5, min: 1, max: 60 },
              { label: '首页置顶', name: 'pinned', widget: 'boolean', default: false, required: false, hint: '开启后文章将固定显示在首页文章区域最前面，不会被新文章挤掉' },
              { label: '封面图片', name: 'image', widget: 'image', required: false, hint: '上传封面图（建议尺寸：1200x630）' },
              {
                label: '引导卡片（文章右侧+底部显示）', name: 'cta_cards', widget: 'select', multiple: true, required: false,
                options: [
                  { label: '八字付费解读', value: 'bazi' },
                  { label: '测缘分（Soulmate Calculator）', value: 'soulmate' },
                  { label: '测五行（Five Elements Test）', value: 'five-elements' },
                  { label: '黄历日历（Chinese Almanac）', value: 'almanac' },
                  { label: '查看生肖（Chinese Zodiac Lookup）', value: 'zodiac-lookup' }
                ],
                hint: '选择这篇文章要挂哪些引导卡片，可多选。不选则默认显示八字卡片。'
              },
              {
                label: 'Related Posts', name: 'related_posts', widget: 'relation',
                collection: 'blog',
                searchFields: ['title'],
                valueField: 'title',
                multiple: true,
                required: false,
                max: 3,
                hint: 'Pick 1-3 related articles shown at bottom. Leave empty for auto-suggest.'
              },
              { label: '正文', name: 'body', widget: 'markdown', hint: '使用Markdown编写文章内容。## 标题，> 引用，**加粗**等' },
              {
                label: '常见问题', name: 'faq', widget: 'list', required: false,
                hint: '添加FAQ问答（用于SEO结构化数据）',
                field: { label: '问题', name: 'question', widget: 'string', fields: [{ label: '回答', name: 'answer', widget: 'text' }] }
              }
            ]
          }
        ]
      }
    });
    </script>
</body>
</html>
