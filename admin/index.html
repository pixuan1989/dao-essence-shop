<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>博客管理 — DAO Essence</title>
    <style id="cms-loading-style">
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0b08;
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #cms-loader {
            text-align: center;
        }
        #cms-loader .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212,175,55,0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        #cms-loader p {
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }
        #cms-loader .sub {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-top: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="cms-loader">
        <div class="spinner"></div>
        <p>正在加载管理系统...</p>
        <p class="sub">DAO Essence 博客管理</p>
    </div>
    <script>
        // Fix: Ensure localStorage is accessible before CMS loads
        // Edge Tracking Prevention may have corrupted CMS data
        try {
            // Check for stale/corrupted CMS auth data and clean it
            const cmsKeyPrefix = 'decap-cms';
            const legacyPrefix = 'netlify-cms';
            let cleaned = false;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith(cmsKeyPrefix) || key.startsWith(legacyPrefix))) {
                    console.log('[CMS Init] Found stored key:', key, '- value length:', localStorage.getItem(key)?.length || 0);
                }
            }
            // List ALL localStorage keys for debugging
            console.log('[CMS Init] All localStorage keys:', Object.keys(localStorage));
            // Check for any token-like values
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const val = localStorage.getItem(key);
                if (val && (val.includes('token') || val.includes('ghp_') || key.includes('oauth'))) {
                    console.log('[CMS Init] Possible auth key:', key, '- preview:', val.substring(0, 50));
                }
            }
            // Also check for ncp-github specifically
            const ncpKey = 'ncp-github';
            const ncpVal = localStorage.getItem(ncpKey);
            if (ncpVal) {
                console.log('[CMS Init] ncp-github found:', ncpVal.substring(0, 50));
            } else {
                console.log('[CMS Init] ncp-github NOT found in localStorage');
            }
        } catch (e) {
            console.error('[CMS Init] localStorage access failed:', e);
        }
    </script>
    <script src="decap-cms.js"></script>
    <script>
        // Remove loading styles and loader once CMS is ready
        const checkLoaded = setInterval(() => {
            const cmsRoot = document.querySelector('[class*="nc-app-"]') || document.querySelector('[id*="nc-"]');
            if (cmsRoot) {
                clearInterval(checkLoaded);
                const style = document.getElementById('cms-loading-style');
                if (style) style.remove();
                const loader = document.getElementById('cms-loader');
                if (loader) loader.remove();
            }
        }, 200);
        // Fallback: remove after 10s max
        setTimeout(() => {
            clearInterval(checkLoaded);
            const style = document.getElementById('cms-loading-style');
            if (style) style.remove();
            const loader = document.getElementById('cms-loader');
            if (loader) loader.remove();
        }, 10000);
    </script>
</body>
</html>
