<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>博客管理 — DAO Essence</title>
    <style id="cms-loading-style">
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0b08;
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #cms-loader {
            text-align: center;
        }
        #cms-loader .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212,175,55,0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        #cms-loader p {
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }
        #cms-loader .sub {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-top: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="cms-loader">
        <div class="spinner"></div>
        <p>正在加载管理系统...</p>
        <p class="sub">DAO Essence 博客管理</p>
    </div>
    <script>
        // Clear ALL stale CMS auth data before loading DecapCMS
        // This prevents stuck loading from corrupted/incompatible tokens
        (function() {
            const prefixes = ['decap-cms', 'netlify-cms', 'ncp-github', 'netylify-cms-user'];
            let cleared = 0;
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key && prefixes.some(p => key.startsWith(p) || key.includes(p))) {
                    console.log('[CMS Cleanup] Removing:', key);
                    localStorage.removeItem(key);
                    cleared++;
                }
            }
            if (cleared > 0) console.log('[CMS Cleanup] Cleared', cleared, 'stale keys');
        })();
    </script>
    <script src="decap-cms.js"></script>
    <script>
        // Show reset button if CMS fails to load after 5s
        setTimeout(function() {
            var cmsRoot = document.querySelector('[class*="nc-app-"]') || document.querySelector('[id*="nc-"]');
            if (!cmsRoot) {
                var btn = document.createElement('button');
                btn.textContent = 'CMS 加载失败 — 点击清除缓存并重试';
                btn.style.cssText = 'position:fixed;top:20px;right:20px;z-index:99999;padding:12px 24px;background:#d4af37;color:#0d0b08;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;';
                btn.onclick = function() {
                    // Clear everything and reload
                    localStorage.clear();
                    sessionStorage.clear();
                    location.reload();
                };
                document.body.appendChild(btn);
            }
        }, 5000);
    </script>
    <script>
        // Remove loading styles and loader once CMS is ready
        const checkLoaded = setInterval(() => {
            const cmsRoot = document.querySelector('[class*="nc-app-"]') || document.querySelector('[id*="nc-"]');
            if (cmsRoot) {
                clearInterval(checkLoaded);
                const style = document.getElementById('cms-loading-style');
                if (style) style.remove();
                const loader = document.getElementById('cms-loader');
                if (loader) loader.remove();
            }
        }, 200);
        // Fallback: remove after 10s max
        setTimeout(() => {
            clearInterval(checkLoaded);
            const style = document.getElementById('cms-loading-style');
            if (style) style.remove();
            const loader = document.getElementById('cms-loader');
            if (loader) loader.remove();
        }, 10000);
    </script>
</body>
</html>
