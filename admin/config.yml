        widget: "text"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        default: "{{now}}"
      - label: "Read Time"
        name: "readTime"
        widget: "number"
        default: 5
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

