<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付测试 - DAO Essence</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔧 DAO Essence 支付系统测试</h1>
    
    <div class="test-section">
        <h2>步骤 1: 添加测试商品到购物车</h2>
        <button onclick="addTestItem()">添加测试商品</button>
        <div id="cart-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>步骤 2: 跳转到结账页面</h2>
        <button onclick="goToCheckout()">去结账</button>
    </div>
    
    <div class="test-section">
        <h2>测试信息</h2>
        <p><strong>测试卡号:</strong> 4242 4242 4242 4242</p>
        <p><strong>过期日期:</strong> 12/25</p>
        <p><strong>CVC:</strong> 123</p>
        <p><strong>邮编:</strong> 12345</p>
    </div>

    <script>
        // 添加测试商品到购物车
        function addTestItem() {
            const testItem = {
                id: 'test-product-001',
                name: 'Test Product',
                nameCn: '测试商品',
                price: 99.99,
                quantity: 1,
                image: 'https://via.placeholder.com/150'
            };
            
            // 获取现有购物车或创建新的
            let cart = JSON.parse(localStorage.getItem('daoessence_cart') || '{"items":[]}');
            
            // 添加商品
            cart.items.push(testItem);
            
            // 保存到 localStorage
            localStorage.setItem('daoessence_cart', JSON.stringify(cart));
            
            // 显示结果
            document.getElementById('cart-result').innerHTML = 
                '<span class="success">✅ 测试商品已添加到购物车!</span>\n' +
                '商品: ' + testItem.nameCn + '\n' +
                '价格: $' + testItem.price + '\n' +
                '购物车商品数: ' + cart.items.length;
        }
        
        // 跳转到结账页面
        function goToCheckout() {
            window.location.href = 'checkout.html';
        }
        
        // 页面加载时显示当前购物车状态
        window.onload = function() {
            const cart = JSON.parse(localStorage.getItem('daoessence_cart') || '{"items":[]}');
            if (cart.items.length > 0) {
                document.getElementById('cart-result').innerHTML = 
                    '<span class="success">购物车已有 ' + cart.items.length + ' 件商品</span>';
            }
        };
    </script>
</body>
</html>
