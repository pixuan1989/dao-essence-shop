<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | DAO Essence</title>
    <meta name="description" content="Complete your purchase of DAO Essence Taoist digital resources. Secure checkout with instant delivery.">
    <meta name="robots" content="noindex, nofollow">

</head>
<body>
    <!-- 直接购买模式：静默跳转到 Creem 支付页，无任何 UI -->
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isDirectMode = urlParams.get('mode') === 'direct';

            if (isDirectMode) {
                const orderData = sessionStorage.getItem('directOrder');
                if (orderData) {
                    processDirectCheckout(JSON.parse(orderData));
                } else {
                    window.location.href = 'shop.html';
                }
                return;
            }

            // 非直接购买模式：跳转到 Shop 页面（旧订单页已废弃）
            window.location.href = 'shop.html';
        })();

        async function processDirectCheckout(orderData) {
            try {
                const response = await fetch('/api/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const data = await response.json();
                const checkoutUrl = data.checkoutUrl || data.checkout_url || data.url;
                if (checkoutUrl) {
                    window.location.replace(checkoutUrl);
                } else {
                    console.error('No checkout URL:', data);
                    window.location.href = 'shop.html';
                }
            } catch (error) {
                console.error('Checkout error:', error);
                window.location.href = 'shop.html';
            }
        }
    </script>
</body>
</html>
