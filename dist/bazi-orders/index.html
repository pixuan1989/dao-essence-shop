<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Manage your BaZi numerology orders on DAO Essence.">
    <link rel="canonical" href="https://www.daoessentia.com/bazi-orders">
    <title>BaZi Orders | DAO Essence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }

        /* ========== 登录页面 ========== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-box {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 80px rgba(212, 175, 55, 0.05);
        }

        .login-logo {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 1.6rem;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .login-input-group label {
            display: block;
            text-align: left;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #e8e8e8;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .login-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .login-input::placeholder {
            color: #555;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #d4af37, #b8941f);
            color: #1a1a2e;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #ef5350;
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .login-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #555;
            font-size: 0.8rem;
        }

        /* ========== 管理面板 ========== */
        .admin-panel {
            padding: 20px;
            display: none;
        }

        .admin-panel.visible {
            display: block;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
        }

        .header-actions {
            text-align: right;
            margin-bottom: 20px;
        }

        .btn-logout {
            padding: 8px 18px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            background: transparent;
            color: #888;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            border-color: #ef5350;
            color: #ef5350;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            color: #d4af37;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #888;
            font-size: 0.9rem;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters input, .filters select {
            padding: 10px 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e8e8e8;
            font-family: inherit;
        }

        .filters input::placeholder {
            color: #666;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8941f);
            color: #1a1a2e;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .orders-table {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .orders-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table th {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .orders-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
        }

        .orders-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .bazi-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            font-size: 0.85rem;
        }

        .bazi-info span {
            color: #888;
        }

        .bazi-info strong {
            color: #d4af37;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-paid {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .email-link {
            color: #64b5f6;
            text-decoration: none;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state h3 {
            color: #888;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .modal-header h2 {
            color: #d4af37;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #888;
        }

        .detail-value {
            color: #e8e8e8;
            font-weight: 600;
        }

        .notes-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            min-height: 100px;
        }

        /* Loading 状态 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .orders-table {
                overflow-x: auto;
            }

            .orders-table table {
                min-width: 800px;
            }

            .bazi-info {
                grid-template-columns: 1fr;
            }

            .login-box {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== 登录页面 ========== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">☯️</div>
            <div class="login-title">Dao Essence</div>
            <div class="login-subtitle">八字命理订单管理系统</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="login-input-group">
                    <label>管理密钥</label>
                    <input 
                        type="password" 
                        id="loginKey" 
                        class="login-input" 
                        placeholder="请输入管理员密钥"
                        autocomplete="current-password"
                        autofocus
                    >
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    🔓 进入管理后台
                </button>
                <div class="login-error" id="loginError"></div>
            </form>

            <div class="login-footer">
                仅限授权管理人员访问
            </div>
        </div>
    </div>

    <!-- ========== Loading ========== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- ========== 管理面板 ========== -->
    <div class="admin-panel" id="adminPanel">
        <div class="container">
            <div class="header-actions">
                <button class="btn-logout" onclick="handleLogout()">🚪 退出登录</button>
            </div>

            <header>
                <h1>☯️ 八字命理订单管理</h1>
                <p>查看和管理所有八字命理分析订单</p>
            </header>

            <div class="stats-bar">
                <div class="stat-card">
                    <h3 id="totalOrders">0</h3>
                    <p>总订单数</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayOrders">0</h3>
                    <p>今日订单</p>
                </div>
                <div class="stat-card">
                    <h3 id="pendingOrders">0</h3>
                    <p>待处理</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalRevenue">$0</h3>
                    <p>总收入</p>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="搜索姓名、邮箱或订单号...">
                <select id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="paid">已支付</option>
                    <option value="pending">待处理</option>
                </select>
                <input type="date" id="dateFilter">
                <button class="btn btn-primary" onclick="refreshOrders()">🔄 刷新</button>
                <button class="btn btn-primary" onclick="exportOrders()">📥 导出</button>
            </div>

            <div class="orders-table">
                <table>
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>客户信息</th>
                            <th>八字信息</th>
                            <th>金额</th>
                            <th>状态</th>
                            <th>时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <h3>暂无订单数据</h3>
                <p>当用户完成八字命理分析支付后，订单将显示在这里</p>
            </div>
        </div>
    </div>

    <!-- 订单详情弹窗 -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>订单详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let orders = [];
        let adminKey = null;

        // ========== 登录逻辑 ==========
        async function handleLogin(e) {
            e.preventDefault();
            const key = document.getElementById('loginKey').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            if (!key) {
                loginError.textContent = '请输入管理密钥';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '验证中...';
            loginError.textContent = '';

            try {
                const response = await fetch('/api/get-bazi-orders', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${key}` }
                });

                if (response.status === 401) {
                    loginError.textContent = '密钥错误，请重新输入';
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔓 进入管理后台';
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    adminKey = key;
                    localStorage.setItem('baziAdminKey', key);
                    orders = result.orders;
                    showAdminPanel();
                } else {
                    loginError.textContent = '加载失败: ' + (result.error || '未知错误');
                }
            } catch (error) {
                loginError.textContent = '连接失败: ' + error.message;
            }

            loginBtn.disabled = false;
            loginBtn.textContent = '🔓 进入管理后台';
        }

        // 显示管理面板
        function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('visible');
            renderOrders();
            updateStats();
        }

        // 退出登录
        function handleLogout() {
            adminKey = null;
            localStorage.removeItem('baziAdminKey');
            orders = [];
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPanel').classList.remove('visible');
            document.getElementById('loginKey').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // 加载订单
        async function loadOrders() {
            if (!adminKey) return;

            showLoading(true);

            try {
                const response = await fetch('/api/get-bazi-orders', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${adminKey}` }
                });

                if (response.status === 401) {
                    handleLogout();
                    return;
                }

                const result = await response.json();
                if (result.success) {
                    orders = result.orders;
                    renderOrders();
                    updateStats();
                }
            } catch (error) {
                console.error('加载订单错误:', error);
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }

        // ========== 初始化：检查是否有保存的密钥 ==========
        document.addEventListener('DOMContentLoaded', async function() {
            const savedKey = localStorage.getItem('baziAdminKey');

            if (savedKey) {
                // 尝试用保存的密钥自动登录
                try {
                    const response = await fetch('/api/get-bazi-orders', {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${savedKey}` }
                    });

                    if (response.status === 200) {
                        const result = await response.json();
                        if (result.success) {
                            adminKey = savedKey;
                            orders = result.orders;
                            showAdminPanel();
                            return;
                        }
                    }
                } catch (e) {
                    // 网络错误，不自动登录
                }

                localStorage.removeItem('baziAdminKey');
            }

            // 没有有效密钥，显示登录页（让用户手动输入）
            document.getElementById('loginKey').focus();
        });

        // ========== 订单管理逻辑 ==========

        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            const emptyState = document.getElementById('emptyState');
            let filteredOrders = filterOrders();

            if (filteredOrders.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = filteredOrders.map(order => `
                <tr>
                    <td>
                        <strong>${order.orderId?.slice(-8) || 'N/A'}</strong>
                        <br><small style="color: #666;">${order.checkoutId?.slice(-12) || ''}</small>
                    </td>
                    <td>
                        <strong>${order.name || '匿名用户'}</strong>
                        <br>
                        <a href="mailto:${order.email}" class="email-link">${order.email || '无邮箱'}</a>
                    </td>
                    <td>
                        <div class="bazi-info">
                            <span><strong>年:</strong> ${order.birthYear || '-'}</span>
                            <span><strong>月:</strong> ${order.birthMonth || '-'}</span>
                            <span><strong>日:</strong> ${order.birthDay || '-'}</span>
                            <span><strong>时:</strong> ${order.birthHour || '-'}</span>
                            <span><strong>性别:</strong> ${order.gender === 'male' ? '男' : order.gender === 'female' ? '女' : '-'}</span>
                            <span><strong>地点:</strong> ${order.birthPlace || '-'}</span>
                        </div>
                    </td>
                    <td>
                        <strong style="color: #d4af37;">$${order.amount || '0.00'}</strong>
                    </td>
                    <td>
                        <span class="status-badge ${order.status === 'paid' ? 'status-paid' : 'status-pending'}">
                            ${order.status === 'paid' ? '✓ 已支付' : '⏳ 待处理'}
                        </span>
                    </td>
                    <td>
                        ${formatDate(order.createdAt)}
                    </td>
                    <td>
                        <button class="btn btn-primary" onclick="viewOrder('${order.orderId}')">查看</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterOrders() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            return orders.filter(order => {
                const matchesSearch = !searchTerm ||
                    (order.name && order.name.toLowerCase().includes(searchTerm)) ||
                    (order.email && order.email.toLowerCase().includes(searchTerm)) ||
                    (order.orderId && order.orderId.toLowerCase().includes(searchTerm));

                const matchesStatus = !statusFilter || order.status === statusFilter;

                const matchesDate = !dateFilter ||
                    (order.createdAt && order.createdAt.startsWith(dateFilter));

                return matchesSearch && matchesStatus && matchesDate;
            });
        }

        function updateStats() {
            document.getElementById('totalOrders').textContent = orders.length;

            const today = new Date().toISOString().split('T')[0];
            const todayCount = orders.filter(o => o.createdAt && o.createdAt.startsWith(today)).length;
            document.getElementById('todayOrders').textContent = todayCount;

            const pendingCount = orders.filter(o => o.status === 'pending').length;
            document.getElementById('pendingOrders').textContent = pendingCount;

            const totalRevenue = orders
                .filter(o => o.status === 'paid')
                .reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);
            document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
        }

        function viewOrder(orderId) {
            const order = orders.find(o => o.orderId === orderId);
            if (!order) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">订单号</span>
                    <span class="detail-value">${order.orderId}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Checkout ID</span>
                    <span class="detail-value">${order.checkoutId || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">客户姓名</span>
                    <span class="detail-value">${order.name || '匿名用户'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">邮箱</span>
                    <span class="detail-value"><a href="mailto:${order.email}" class="email-link">${order.email || 'N/A'}</a></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">支付金额</span>
                    <span class="detail-value" style="color: #d4af37;">$${order.amount || '0.00'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">支付状态</span>
                    <span class="detail-value">${order.status === 'paid' ? '✓ 已支付' : '⏳ 待处理'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">出生年份</span>
                    <span class="detail-value">${order.birthYear || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">出生月份</span>
                    <span class="detail-value">${order.birthMonth || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">出生日期</span>
                    <span class="detail-value">${order.birthDay || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">出生时辰</span>
                    <span class="detail-value">${order.birthHour || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">性别</span>
                    <span class="detail-value">${order.gender === 'male' ? '男' : order.gender === 'female' ? '女' : 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">出生地点</span>
                    <span class="detail-value">${order.birthPlace || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">下单时间</span>
                    <span class="detail-value">${formatDateTime(order.createdAt)}</span>
                </div>
                <div style="margin-top: 20px;">
                    <span class="detail-label">用户备注</span>
                    <div class="notes-box">
                        ${order.notes || '无备注'}
                    </div>
                </div>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function refreshOrders() {
            loadOrders();
        }

        function exportOrders() {
            const csvContent = [
                ['订单号', 'Checkout ID', '姓名', '邮箱', '金额', '状态', '出生年', '出生月', '出生日', '出生时辰', '性别', '出生地点', '备注', '下单时间'],
                ...orders.map(o => [
                    o.orderId, o.checkoutId, o.name, o.email, o.amount, o.status,
                    o.birthYear, o.birthMonth, o.birthDay, o.birthHour, o.gender,
                    o.birthPlace, o.notes, o.createdAt
                ])
            ].map(row => row.join(',')).join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `bazi-orders-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        // 监听筛选
        document.getElementById('searchInput').addEventListener('input', renderOrders);
        document.getElementById('statusFilter').addEventListener('change', renderOrders);
        document.getElementById('dateFilter').addEventListener('change', renderOrders);

        // 点击弹窗外部关闭
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
