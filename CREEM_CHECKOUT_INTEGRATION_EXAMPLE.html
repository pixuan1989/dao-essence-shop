<!--
    checkout.html 集成示例

    在 checkout.html 的 <head> 中添加以下脚本引用：
-->

<!-- 1. 首先引入折扣标记辅助脚本 -->
<script src="js/creem-discount-helper.js"></script>

<!-- 2. 然后引入 Creem 支付集成脚本 -->
<script src="js/creem-checkout-integration.js"></script>


<!--
    在 checkout.html 的 <body> 中添加折扣提示元素：

    在订单摘要区域（.order-summary）的开头添加：
-->

<div id="discount-notice"></div>


<!--
    在结账按钮（#checkout-btn）中，确保按钮 ID 正确：

    <button id="checkout-btn" class="checkout-btn btn-primary">
        去支付
    </button>
-->
